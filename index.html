<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />

    <!-- PWA -->
    <link
      rel="apple-touch-startup-image"
      href="icons/splash-screen-1080x1920.png"
    />
    <link rel="manifest" href="manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#000000" />

    <!-- Instant splash (geen flits) -->
    <style>
      #splash {
        position: fixed;
        inset: 0;
        background: url("icons/splash-screen-1080x1920.png") center
          calc(50% - 22px) / cover no-repeat;
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.5s;
      }
    </style>

    <script>
      // Service worker
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./service-worker.js");
      }

      // Splash fade-out
      window.addEventListener("load", () => {
        const splash = document.getElementById("splash");

        setTimeout(() => {
          splash.style.opacity = "0";
          setTimeout(() => splash.remove(), 500);
        }, 5000);
      });
    </script>

    <!-- Main script -->
    <script type="module" src="./js/script.js" defer></script>

    <link rel="stylesheet" href="style.css" />
    <title>AudioApp</title>
  </head>

  <body>
    <!-- Instant splash -->
    <div id="splash"></div>

    <img src="./icons/homescreen-text.png" alt="logo CustomLowzzz" id="logo" />
    <div id="lijst"></div>
  </body>
</html>
